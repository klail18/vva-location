        fr: "CONTRAT DE PRÊT D'ÉQUIPEMENTS DE LOISIRS\n\nEntre les soussignés :\n• Le prestataire : Villas Vallée d'Asco (SAS)\n• Le locataire : " + resa.clientName + "\n\nArticle 1 – Objet\nLe prestataire met à disposition du client, à titre gracieux, des équipements de loisirs (vélos électriques et paddles) pour la journée convenue.\n\nArticle 2 – Responsabilité\nLe client s'engage à utiliser les équipements avec soin. Tout dommage causé par négligence ou mauvaise utilisation sera à la charge du client, estimé à la valeur de remplacement de l'équipement.\n\nArticle 3 – Restitution\nLes équipements devront être restitués en bon état à la fin de la journée. En cas de perte ou dommage irréparable, le client s'engage à dédommager le prestataire.\n\nArticle 4 – Sécurité vélo électrique\nLe client s'engage à respecter le code de la route, à ne pas prêter les équipements à des tiers, et à signaler immédiatement tout problème mécanique.\n\nArticle 5 – Sécurité paddle\nLes paddles doivent être utilisés dans les zones autorisées. Le client s'assure de savoir nager ou de porter un gilet de sauvetage. Le prestataire décline toute responsabilité en cas d'accident.\n\nArticle 6 – Annulation\nToute réservation peut être annulée jusqu'à 24h avant la date de location.",

    async function sendReportMail(resas, period) {
      var labels = EQ_LABELS_FR;
      var now    = new Date();
      var from, to, label;

      if (period === "week") {
        label = "semaine";
        var day = now.getDay() === 0 ? 6 : now.getDay() - 1;
        var mon = new Date(now); mon.setDate(now.getDate() - day);
        var sun = new Date(mon); sun.setDate(mon.getDate() + 6);
        from = mon.toISOString().split("T")[0];
        to   = sun.toISOString().split("T")[0];
      } else {
        label = "mois";
        var y = now.getFullYear(), m = now.getMonth();
        from  = y + "-" + String(m+1).padStart(2,"0") + "-01";
        to    = new Date(y, m+1, 0).toISOString().split("T")[0];
      }

      var filtered = resas
        .filter(function(r){ return r.status === "confirmed" && r.date >= from && r.date <= to; })
        .sort(function(a,b){ return a.date.localeCompare(b.date); });

      var lines = filtered.length === 0
        ? "Aucune réservation sur cette période."
        : filtered.map(function(r){
            return "• " + fmtDate(r.date) + " — " + r.clientName + " (" + r.clientEmail + ")\n  "
                   + r.equipment.map(function(id){ return labels[id]||id; }).join(", ");
          }).join("\n\n");

      var body    = "RAPPORT DE LOCATION — " + label.toUpperCase() + "\n"
                  + fmtDate(from) + " → " + fmtDate(to) + "\n\n"
                  + lines + "\n\nTotal : " + filtered.length
                  + " réservation" + (filtered.length > 1 ? "s" : "");
      var subject = "Rapport " + label + " VVA – " + fmtDate(from) + " → " + fmtDate(to);

      await emailjs.send("service_nfp7n4q", "template_vahjpcg", {
        to_email:      STAFF_EMAIL,
        email_subject: subject,
        email_body:    body
      });

      return { from: from, to: to, count: filtered.length, items: filtered };
    }
  </script>

    var CONTRACTS = {
      fr: "CONDITIONS GENERALES DE LOCATION - VTC E-BIKE SPECIALIZED COMO 4.0\n\nSAS Villas Vallee d'Asco - 195 lieu dit corsu, 20218 Moltifao\nTel : 06-12-38-58-67 - vva-corse.com\n\nARTICLE 1 : OBJET DU CONTRAT\nLe present document a pour objet de fixer les modalites de location des VTC Specialized COMO 4.0 avec ses equipements de base, proposes par la SAS Villas Vallee d'Asco (nomme ci-apres le loueur). Les conditions de location font partie integrante du contrat de location. Par sa signature, le locataire declare avoir lu et integralement accepte les conditions de location.\n\nARTICLE 2 : EQUIPEMENT DES VELOS\nChaque VTC e-bike loue a un equipement de base compose d'un systeme d'assistance electrique, d'un casque et d'un antivol.\n\nARTICLE 3 : PRISE D'EFFET, MISE A DISPOSITION ET RECUPERATION\nLa location prend effet au moment ou le locataire prend possession du materiel et des eventuels accessoires qui lui sont fournis. Les risques sont transferes lors de la remise du materiel et des accessoires au locataire qui en assumera la garde sous son entiere responsabilite, celui-ci s'engageant a les utiliser en toutes circonstances 'en bon pere de famille'. Le locataire s'engage a utiliser le VTC e-bike avec soin, a pourvoir a son entretien, a regler tous les dommages causes a celui-ci, amendes et depenses pour toute infraction a la circulation. Toute reparation necessaire sur le VTC e-bike ou accessoires fera l'objet d'une facturation selon les tarifs en vigueur. La duree de location ne pourra exceder une journee pour les personnes exterieures aux Villas Vallee d'Asco.\n\nARTICLE 4 : RESERVATION, PAIEMENT ET MODES DE REGLEMENT\nLa reservation de materiel n'est enregistree qu'a reception du montant total de la location. Aucun remboursement, pour quelque motif que ce soit, ne sera accorde. Les modes de reglement acceptes sont : carte bancaire, lien de paiement. La caution est fixee a 1500 EUR TTC par VTC e-bike.\n\nARTICLE 5 : UTILISATION\nLe locataire certifie etre apte a pouvoir se servir du materiel loue, qu'il s'engage a utiliser lui-meme. Le locataire du VTC e-bike declare n'avoir connaissance d'aucune contre-indication medicale. Le pret ou la sous-location du materiel sont strictement interdits. Le locataire s'engage a utiliser le VTC e-bike avec prudence, sans danger pour les tiers conformement aux reglementations en vigueur. Il est tenu personnellement responsable de toute infraction au code de la route, ainsi que des dommages corporels et materiels. Le port du casque est tres vivement conseille par le loueur.\n\nARTICLE 6 : RESPONSABILITE, CASSE-VOL\nLe locataire degage la SAS Villas Vallee d'Asco de toute responsabilite decoulant de l'utilisation du materiel loue, notamment en ce qui concerne les consequences corporelles, materielles et immaterielles des accidents de toutes natures. Le locataire declare etre titulaire d'une assurance personnelle en responsabilite civile. Le locataire ne beneficie d'aucune couverture d'assurance pour les dommages subis par le materiel loue et engage personnellement sa responsabilite a raison desdits dommages, casse et vol.\n\nARTICLE 7 : CAUTION\nLors de la mise a disposition du materiel par le loueur, il est demande au locataire de verser une caution de 1500 EUR par VTC e-bike par carte bancaire. Cette caution est encaissee pendant la duree de la location. A la restitution du materiel, la caution est rendue au locataire, deduction faite des eventuels dommages prevus a l'article 6.\n\nARTICLE 8 : RESTITUTION\nLa restitution du materiel loue se fera a l'horaire prevu au contrat. Tout retard sera facture 15 EUR de l'heure. Pour des raisons de securite, le locataire s'engage a signaler au loueur les chocs eventuels subis par les casques.\n\nARTICLE 9 : EVICTION DU LOUEUR\nLes accessoires livres avec le materiel ne doivent pas etre enleves ou modifies par le locataire. Le materiel ne peut etre cede, ni remis en garantie.\n\nARTICLE 10 : DROIT APPLICABLE\nLes litiges decoulant de l'application des presentes conditions generales de vente sont soumises au droit francais et seuls les tribunaux francais peuvent connaitre de ces litiges.\n\nARTICLE 11 : RETRACTATION\nL'article L.121-20-4 du code de la consommation prevoit que le droit de retractation n'est pas applicable aux prestations touristiques.\n\nARTICLE 12 : OBLIGATION DU LOCATAIRE\nLe contrat de location est conclu avec le locataire en personne. Le client doit etre une personne physique de plus de 18 ans. Les utilisateurs devront etre aptes a la pratique du velo, mesurer au minimum 1.55m et peser au maximum 110kg. Tout mineur doit etre accompagne par une personne majeure responsable.\n\nARTICLE 13 : PROPRIETE\nLe materiel loue reste la propriete exclusive de SAS Villas Vallee d'Asco pendant la duree de la location.\n\nTARIFS DES PIECES DEGRADEES\nVelo : 4000 EUR | Batterie : 999 EUR | Suspension : 999 EUR | Pedalier : 549.90 EUR | Selle : 279.90 EUR | Jante : 249.90 EUR | Tige de selle : 189.90 EUR | Guidon : 169.90 EUR | Plateau : 159.90 EUR | Pedales : 159.90 EUR | Pneu : 42.90 EUR | Assistance technique : 100 EUR",

      en: "GENERAL TERMS AND CONDITIONS FOR RENTING A SPECIALIZED COMO 4.0 E-BIKE\n\nSAS Villas Vallee d'Asco - 195 lieu dit corsu, 20218 Moltifao\nTel: 06-12-38-58-67 - vva-corse.com\n\nARTICLE 1: PURPOSE OF THE CONTRACT\nThe purpose of this document is to set out the terms and conditions for renting Specialized COMO 4.0 hybrid bikes with basic equipment, offered by SAS Villas Vallee d'Asco (hereinafter referred to as the rental company). By signing this agreement, the renter declares that they have read and fully accepted the rental conditions.\n\nARTICLE 2: BIKE EQUIPMENT\nEach e-bike hired comes with basic equipment consisting of an electric assistance system, a helmet and an anti-theft device.\n\nARTICLE 3: EFFECTIVE DATE, AVAILABILITY AND RETURN\nThe rental takes effect when the renter takes possession of the equipment and any accessories provided. The hirer undertakes to use the e-bike carefully, to maintain it, to pay for any damage caused to it, fines and expenses for any traffic offences. The rental period may not exceed one day for persons outside Villas Vallee d'Asco.\n\nARTICLE 4: RESERVATION AND PAYMENT\nEquipment reservations are only confirmed upon receipt of the total rental amount. No refunds will be given for any reason whatsoever. Accepted payment methods are: credit card, payment link. The deposit is set at 1,500 EUR including VAT per e-bike.\n\nARTICLE 5: USE\nThe renter certifies that they are capable of using the rented equipment and undertakes to use it themselves. Lending or subletting the equipment is strictly prohibited. The hirer undertakes to use the e-bike carefully, without endangering third parties. The hirer is personally liable for any violation of the Highway Code, as well as for any bodily injury or material damage. The hirer strongly recommends wearing a helmet.\n\nARTICLE 6: LIABILITY, BREAKAGE AND THEFT\nThe tenant releases SAS Villas Vallee d'Asco from any liability arising from the use of the rented equipment. The tenant declares that they hold personal civil liability insurance. The tenant has no insurance cover for damage to the rented equipment and is personally liable for such damage, breakage and theft.\n\nARTICLE 7: DEPOSIT\nWhen the equipment is made available, the lessee is required to pay a deposit of 1,500 EUR per hybrid e-bike by credit card. This deposit is retained for the duration of the rental and returned upon return of the equipment less any deductions provided for in Article 6.\n\nARTICLE 8: RETURN\nThe rented equipment must be returned at the time specified in the contract. Any delay will be charged at 15 EUR per hour.\n\nARTICLE 9: EVICTION OF THE LESSOR\nThe accessories supplied with the equipment must not be removed or modified by the lessee. The equipment may not be transferred or used as collateral.\n\nARTICLE 10: APPLICABLE LAW\nAny disputes arising from these general terms and conditions shall be subject to French law and only French courts shall have jurisdiction.\n\nARTICLE 11: WITHDRAWAL\nThe right of withdrawal does not apply to tourist services.\n\nARTICLE 12: OBLIGATIONS OF THE TENANT\nThe rental agreement is concluded with the renter in person and is neither transferable nor assignable. The customer must be a natural person over the age of 18, able to ride a bicycle, at least 1.55m tall and weighing no more than 110kg. All minors must be accompanied by a responsible adult.\n\nARTICLE 13: OWNERSHIP\nThe rented equipment remains the exclusive property of SAS Villas Vallee d'Asco for the duration of the rental period.\n\nPRICES OF DAMAGED PARTS\nBicycle: 4,000 EUR | Battery: 999 EUR | Suspension: 999 EUR | Crankset: 549.90 EUR | Saddle: 279.90 EUR | Rim: 249.90 EUR | Seat post: 189.90 EUR | Handlebars: 169.90 EUR | Chainring: 159.90 EUR | Pedals: 159.90 EUR | Tyre: 42.90 EUR | Technical assistance: 100 EUR"

    function genId()    { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
    function todayISO() { return new Date().toISOString().split("T")[0]; }
    function fmtFull(s) { if(!s) return ""; var p=s.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; }
    function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    var EMPTY = { date:"", equipment:[], clientName:"", clientEmail:"", contractAccepted:false, paddleAccepted:false };

    /* ══════════════════ APP ══════════════════ */
    function App() {
      var resas_state     = useState([]);
      var ready_state     = useState(false);
      var lang_state      = useState("fr");
      var staff_state     = useState(false);

      var resas     = resas_state[0], setResas     = resas_state[1];
      var ready     = ready_state[0], setReady     = ready_state[1];
      var lang      = lang_state[0],  setLang      = lang_state[1];
      var staffMode = staff_state[0], setStaffMode = staff_state[1];

      useEffect(function() {
        var ref = db.ref("reservations");
        ref.on("value", function(snap) {
          var val = snap.val();
          setResas(val ? Object.values(val) : []);
          setReady(true);
        });
        return function() { ref.off("value"); };
      }, []);

      function addResa(data) {
        return new Promise(async function(resolve) {
          var ip = await getClientIP();
          var now = new Date().toISOString();
          var r = Object.assign({}, data, {
            id:         genId(),
            lang:       lang,
            status:     "confirmed",
            createdAt:  now,
            acceptedAt: now,
            clientIP:   ip
          });
          await db.ref("reservations/" + r.id).set(r);
          await sendMails(r, lang);
          resolve(r);
        });
      }

      function blockedOn(date) {
        if (!date) return [];
        return resas
          .filter(function(r){ return (r.status === "confirmed" || r.status === "pending") && r.date === date; })
          .reduce(function(acc, r){ return acc.concat(r.equipment); }, []);
      }

      if (!ready) return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'DM Sans',sans-serif",background:"#F7F3EC",color:"#1B5E5E",fontSize:14}}>
          {lang === "fr" ? "Chargement…" : "Loading…"}
        </div>
      );

      if (staffMode) return <StaffPage resas={resas} onBack={function(){setStaffMode(false);}} />;

      return (
        <div style={{fontFamily:"'DM Sans',sans-serif",background:"#F7F3EC",minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
          <BookingFlow lang={lang} setLang={setLang} blockedOn={blockedOn} onAdd={addResa} onStaff={function(){setStaffMode(true);}} />
        </div>
      );
    }

            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,letterSpacing:".15em",opacity:.6,textTransform:"uppercase",marginBottom:6}}>Villas Vallee d'Asco</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:600,lineHeight:1.2,marginBottom:8}}>

              {isEN ? "Electric bikes & paddles at your disposal" : "Velos electriques & paddles a votre disposition"}

          </div>

          <div style={{padding:"20px 16px 0"}}>

            {/* Key benefits */}
            <div style={{display:"flex",gap:10,marginBottom:20}}>
              {[
                {icon:"⚡", val:"80 km", label: isEN?"range":"autonomie"},
                {icon:"🌿", val: isEN?"Free":"Gratuit", label: isEN?"included":"inclus"},
                {icon:"🏅", val:"Eco", label: isEN?"EU Ecolabel":"Ecolabel UE"},
              ].map(function(c){
                return (
                  <div key={c.icon} style={{flex:1,background:"white",borderRadius:14,padding:"14px 8px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
                    <div style={{fontSize:22,marginBottom:4}}>{c.icon}</div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:"#1B5E5E",lineHeight:1}}>{c.val}</div>
                    <div style={{fontSize:10,color:"#AAA",marginTop:2,textTransform:"uppercase",letterSpacing:".05em"}}>{c.label}</div>
                  </div>
                );
              })}
            </div>

            <div style={{background:"white",borderRadius:14,padding:"16px",marginBottom:16,boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#1B5E5E",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>{isEN?"About the bikes":"Les velos"}</div>
              <div style={{fontSize:13,color:"#555",lineHeight:1.7}}>
                {isEN
                  ? "Fancy a ride in the open air? Discover Moltifao or Castifao at your own pace? Explore the Asco valley freely with our Specialized COMO 4.0 e-bikes — up to 80 km range, helmet and lock included."
                  : "Envie d'une balade au grand air ? Rejoindre Moltifao ou Castifao tranquillement ? Explorez la vallee d'Asco a votre rythme avec nos Specialized COMO 4.0 — jusqu'a 80 km d'autonomie, casque et antivol inclus."}
              </div>
            </div>

            {/* Eco */}
            <div style={{background:"#F0F7F4",borderRadius:14,padding:"14px 16px",marginBottom:16,borderLeft:"3px solid #3DBD72"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#2E7D52",marginBottom:6}}>🌱 {isEN?"Eco-responsible commitment":"Engagement eco-responsable"}</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.65}}>
                {isEN
                  ? "This free service is part of our environmental approach. Our property holds the European Ecolabel. Choosing the e-bike means reducing your carbon footprint and preserving the natural beauty of the valley."
                  : "Cette mise a disposition gratuite s'inscrit dans notre demarche environnementale. Notre etablissement est labellise Ecolabel Europeen. Choisir le velo electrique, c'est reduire votre empreinte carbone et preserver la beaute naturelle de la vallee."}
              </div>
            </div>

              </div>
              {(isEN ? [
                "Respect the Highway Code",
                "Always lock the bike, even for a short stop",
                "Use only the provided charger for the battery",
                "Report any incident or malfunction",
                "Return the bike clean with all accessories",
                "Helmet and reflective vest strongly recommended"
              ] : [
                "Respecter le Code de la route",
                "Attacher le velo avec l'antivol fourni, meme pour un arret court",
                "Utiliser uniquement le chargeur fourni pour la batterie",
                "Signaler tout incident ou dysfonctionnement",
                "Restituer le velo propre, avec tous ses accessoires",
                "Casque et gilet de signalisation fortement recommandes"
              ]).map(function(rule, i){
                return (
                  <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:6}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:"#E8F4F4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#1B5E5E",fontWeight:700,flexShrink:0,marginTop:1}}>✓</div>
                    <div style={{fontSize:12,color:"#555",lineHeight:1.5}}>{rule}</div>
                  </div>
                );
              })}
            </div>

            {/* Sizes note */}
            <div style={{background:"#FFF8F0",borderRadius:12,padding:"12px 16px",marginBottom:24,fontSize:12,color:"#C4622D",lineHeight:1.6}}>
              ℹ️ {isEN
                ? "Available sizes: S, M, L. Our team is on hand to advise you and explain how the bikes work."

            </div>

            {/* CTA */}
            <button onClick={onStart} style={{width:"100%",padding:"16px",borderRadius:12,border:"none",background:"#1B5E5E",color:"white",fontFamily:"'DM Sans',sans-serif",fontSize:16,fontWeight:600,cursor:"pointer",letterSpacing:".01em"}}>
              {isEN ? "Book now →" : "Reserver →"}
            </button>

            <div style={{textAlign:"center",fontSize:11,color:"#AAA",marginTop:12,lineHeight:1.6}}>
              {isEN
                ? "A rental contract must be signed before use."
                : "Un contrat de location doit etre signe avant utilisation."}
            </div>
          </div>
        </div>
      );
    }

        /* ── Step 1 : Date + Equipment ── */
    function S1({ form, set, setDate, blocked, lang, t, onNext, onBack }) {
      var labels  = lang==="en" ? EQ_LABELS_EN : EQ_LABELS_FR;
      var canNext = form.date && form.equipment.length > 0;
      function toggle(id) {
        set("equipment", form.equipment.includes(id)
          ? form.equipment.filter(function(e){ return e!==id; })
          : form.equipment.concat([id]));
      }
      var groups = [
        { title: t.bikesGroup,   items: EQUIPMENT.filter(function(e){ return e.type==="bike"; }) },
        { title: t.paddlesGroup, items: EQUIPMENT.filter(function(e){ return e.type==="paddle"; }) },
      ];
      return (
        <div>
          <SHead n={1} t={t} title={t.s1title} />
          <Fld label={t.dateLabel}>
            <input type="date" value={form.date} min={todayISO()} onChange={function(e){setDate(e.target.value);}} style={Object.assign({},INP,{fontSize:16})} />
          </Fld>
          {!form.date && <div style={{textAlign:"center",color:"#C0B8AE",fontSize:13,marginTop:4,marginBottom:12}}>{t.dateHint}</div>}
          {form.date && groups.map(function(g){
            return (
              <div key={g.title} style={{marginBottom:18}}>
                <div style={{fontSize:13,fontWeight:600,color:"#666",marginBottom:10}}>{g.title}</div>
                {g.items.map(function(eq){
                  var on=form.equipment.includes(eq.id), off=blocked.includes(eq.id);
                  return (
                    <button key={eq.id} onClick={function(){if(!off)toggle(eq.id);}} style={{display:"flex",alignItems:"center",gap:12,width:"100%",marginBottom:8,padding:"13px 16px",borderRadius:12,border:"2px solid "+(on?"#1B5E5E":off?"#EEE":"#E5DDD0"),background:on?"#1B5E5E":off?"#F5F5F5":"white",cursor:off?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",textAlign:"left",transition:"all .15s"}}>
                      <span style={{fontSize:22}}>{eq.emoji}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:600,color:on?"white":off?"#CCC":"#2C2C2C"}}>{labels[eq.id]}</div>
                        <div style={{fontSize:11,marginTop:2,color:on?"rgba(255,255,255,.65)":off?"#CCC":"#3DBD72"}}>{off?t.taken:t.available}</div>
                      </div>
                      <div style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+(on?"white":off?"#EEE":"#D0C8BF"),background:on?"white":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {on && <div style={{width:12,height:12,borderRadius:"50%",background:"#1B5E5E"}} />}
                      </div>
                    </button>
                  );
                })}
              </div>
            );
          })}
          <div style={{display:"flex",gap:8}}>
            {onBack && <BBtn onClick={onBack} />}
            <PBtn disabled={!canNext} onClick={onNext} flex={!!onBack}>{t.next1}</PBtn>
          </div>
        </div>
      );
    }

    /* ── Step 2 : Info ── */
    function S2({ form, set, t, onNext, onBack }) {
      var touched_s = useState(false);
      var touched=touched_s[0], setTouched=touched_s[1];
      var emailOk = isEmail(form.clientEmail);
      var valid   = form.clientName.trim() && emailOk;
      var labels  = EQ_LABELS_FR;
      var bC = form.equipment.filter(function(id){ return EQUIPMENT.find(function(e){ return e.id===id&&e.type==="bike"; }); }).length;
      var pC = form.equipment.filter(function(id){ return EQUIPMENT.find(function(e){ return e.id===id&&e.type==="paddle"; }); }).length;
      var eqSum = [
        bC>0 && bC+" "+(bC>1?t.bikePlur:t.bikeSing),
        pC>0 && pC+" "+(pC>1?t.paddlePlur:t.paddleSing)
      ].filter(Boolean).join(", ");
      return (
        <div>
          <SHead n={2} t={t} title={t.s2title} />
          <div style={{background:"white",borderRadius:12,padding:"11px 16px",marginBottom:18,display:"flex",alignItems:"center",gap:10,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            <div style={{fontSize:20}}>{form.equipment.map(function(id){ var e=EQUIPMENT.find(function(x){return x.id===id;}); return e?e.emoji:""; }).join(" ")}</div>
            <div style={{fontSize:13,color:"#555"}}>{eqSum} · <span style={{color:"#1B5E5E",fontWeight:600}}>{fmtFull(form.date)}</span></div>
          </div>
          <Fld label={t.nameLabel}>
            <input value={form.clientName} onChange={function(e){set("clientName",e.target.value);}} placeholder={t.namePh} style={INP} />
          </Fld>
          <Fld label={t.emailLabel}>
            <input type="email" value={form.clientEmail}
              onChange={function(e){set("clientEmail",e.target.value);}}
              onBlur={function(){setTouched(true);}}
              placeholder={t.emailPh}
              style={Object.assign({},INP,{borderColor:touched&&!emailOk&&form.clientEmail?"#E05555":"#E5DDD0"})} />
            {touched&&!emailOk&&form.clientEmail && <div style={{fontSize:11,color:"#E05555",marginTop:4}}>{t.emailErr}</div>}
          </Fld>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <BBtn onClick={onBack} />
            <PBtn disabled={!valid} onClick={onNext} flex={true}>{t.next2}</PBtn>
          </div>
        </div>
      );
    }

    /* ── Step 3 : Contract ── */
    function S3({ form, set, lang, t, onSubmit, onBack, sending }) {
      var scroll1_s = useState(false);
      var scroll2_s = useState(false);
      var scrolled1 = scroll1_s[0], setScrolled1 = scroll1_s[1];
      var scrolled2 = scroll2_s[0], setScrolled2 = scroll2_s[1];

      var hasBike   = form.equipment.some(function(id){ return id.startsWith("B"); });
      var hasPaddle = form.equipment.some(function(id){ return id.startsWith("P"); });
      var bC = form.equipment.filter(function(id){ return id.startsWith("B"); }).length;
      var pC = form.equipment.filter(function(id){ return id.startsWith("P"); }).length;

      // Valid when all applicable contracts are accepted
      var bikeOk   = !hasBike   || form.contractAccepted;
      var paddleOk = !hasPaddle || form.paddleAccepted;
      var valid    = bikeOk && paddleOk;

      return (
        <div>
          <SHead n={3} t={t} title={t.s3title} />

          {/* Recap */}
          <div style={{background:"white",borderRadius:12,padding:"12px 16px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#AAA",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>{t.recap}</div>
            <div style={{fontSize:13,lineHeight:1.9,color:"#444"}}>
              <div>👤 {form.clientName}</div>
              <div>📅 {fmtFull(form.date)}</div>
              {bC>0&&<div>⚡ {bC} {bC>1?t.bikePlur:t.bikeSing}</div>}
              {pC>0&&<div>🚣 {pC} {pC>1?t.paddlePlur:t.paddleSing}</div>}
            </div>
          </div>

          {/* Bike contract */}
          {hasBike && (
            <div style={{marginBottom:16}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1B5E5E",marginBottom:6}}>
                ⚡ {lang==="en"?"E-Bike Rental Agreement":"Contrat location vélos électriques"}
              </div>
              <div style={{position:"relative",marginBottom:6}}>
                <div onScroll={function(e){var el=e.target;if(el.scrollTop+el.clientHeight>=el.scrollHeight-20)setScrolled1(true);}}
                  style={{background:"white",borderRadius:12,padding:"14px 16px",fontSize:11.5,color:"#555",lineHeight:1.7,maxHeight:160,overflowY:"auto",border:"1.5px solid #E5DDD0",whiteSpace:"pre-wrap",fontFamily:"Georgia,serif"}}>
                  {CONTRACTS[lang]}
                </div>
                {!scrolled1&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:42,background:"linear-gradient(transparent,rgba(255,255,255,.95))",borderRadius:"0 0 12px 12px",display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:6,pointerEvents:"none"}}><span style={{fontSize:10,color:"#AAA"}}>{t.scroll}</span></div>}
              </div>
              <div onClick={function(){if(scrolled1)set("contractAccepted",!form.contractAccepted);}}
                style={{background:form.contractAccepted?"#E8F4F4":"white",border:"2px solid "+(form.contractAccepted?"#1B5E5E":"#E5DDD0"),borderRadius:10,padding:"11px 14px",display:"flex",alignItems:"flex-start",gap:10,cursor:scrolled1?"pointer":"not-allowed",opacity:scrolled1?1:.5,transition:"all .2s"}}>
                <div style={{width:18,height:18,borderRadius:4,border:"2px solid "+(form.contractAccepted?"#1B5E5E":"#CCC"),background:form.contractAccepted?"#1B5E5E":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                  {form.contractAccepted&&<span style={{color:"white",fontSize:11,fontWeight:700}}>✓</span>}
                </div>
                <div style={{fontSize:11,color:"#333",lineHeight:1.5}}>{t.checkTxt}</div>
              </div>
            </div>
          )}

          {/* Paddle contract */}
          {hasPaddle && (
            <div style={{marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:700,color:"#C4622D",marginBottom:6}}>
                🚣 {lang==="en"?"Paddle Board Loan Agreement":"Contrat mise à disposition paddle"}
              </div>
              <div style={{position:"relative",marginBottom:6}}>
                <div onScroll={function(e){var el=e.target;if(el.scrollTop+el.clientHeight>=el.scrollHeight-20)setScrolled2(true);}}
                  style={{background:"white",borderRadius:12,padding:"14px 16px",fontSize:11.5,color:"#555",lineHeight:1.7,maxHeight:160,overflowY:"auto",border:"1.5px solid #F5DDCC",whiteSpace:"pre-wrap",fontFamily:"Georgia,serif"}}>
                  {PADDLE_CONTRACTS[lang]}
                </div>
                {!scrolled2&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:42,background:"linear-gradient(transparent,rgba(255,255,255,.95))",borderRadius:"0 0 12px 12px",display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:6,pointerEvents:"none"}}><span style={{fontSize:10,color:"#AAA"}}>{t.scroll}</span></div>}
              </div>
              <div onClick={function(){if(scrolled2)set("paddleAccepted",!form.paddleAccepted);}}
                style={{background:form.paddleAccepted?"#FFF0EB":"white",border:"2px solid "+(form.paddleAccepted?"#C4622D":"#E5DDD0"),borderRadius:10,padding:"11px 14px",display:"flex",alignItems:"flex-start",gap:10,cursor:scrolled2?"pointer":"not-allowed",opacity:scrolled2?1:.5,transition:"all .2s"}}>
                <div style={{width:18,height:18,borderRadius:4,border:"2px solid "+(form.paddleAccepted?"#C4622D":"#CCC"),background:form.paddleAccepted?"#C4622D":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                  {form.paddleAccepted&&<span style={{color:"white",fontSize:11,fontWeight:700}}>✓</span>}
                </div>
                <div style={{fontSize:11,color:"#333",lineHeight:1.5}}>
                  {lang==="en"
                    ? "By ticking this box, I acknowledge having read and fully accepted the paddle board loan conditions above. This constitutes my electronic signature and contractual commitment to SAS Villas Vallée d'Asco."
                    : "En cochant cette case, je soussigné(e) reconnais avoir lu et accepté l'intégralité des conditions de mise à disposition du paddle ci-dessus. Cette acceptation vaut signature électronique envers la SAS Villas Vallée d'Asco."}
                </div>
              </div>
            </div>
          )}

          {/* If paddle only, auto-validate bike contract */}
          {!hasBike && !form.contractAccepted && set("contractAccepted", true) && null}

          <div style={{display:"flex",gap:8,marginTop:hasBike||hasPaddle?0:8}}>
            <BBtn onClick={onBack}/>
            <button onClick={function(){if(valid&&!sending)onSubmit();}} style={{flex:1,padding:"14px",borderRadius:10,border:"none",fontSize:15,fontWeight:600,cursor:valid&&!sending?"pointer":"not-allowed",fontFamily:"'DM Sans',sans-serif",color:"white",background:valid&&!sending?"#1B5E5E":"#D4CFC8",transition:"background .2s",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              {sending?<span><span style={{display:"inline-block",width:16,height:16,border:"2px solid rgba(255,255,255,.4)",borderTopColor:"white",borderRadius:"50%",animation:"spin .7s linear infinite",verticalAlign:"middle"}}></span>{" "+t.sending}</span>:t.sendBtn}
            </button>
          </div>
        </div>
      );
    }

    /* ── Done Screen ── */
    function DoneScreen({ resa, lang, t, onNew }) {
      var labels = lang==="en" ? EQ_LABELS_EN : EQ_LABELS_FR;
      return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24,background:"#F7F3EC"}}>
          <div style={{width:72,height:72,background:"#1B5E5E",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,marginBottom:24}}>✅</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:600,marginBottom:8,textAlign:"center"}}>{t.doneTitle}</div>
          <div style={{fontSize:14,color:"#888",textAlign:"center",marginBottom:28,lineHeight:1.7}}>
            {t.doneSub}<br/><strong style={{color:"#1B5E5E"}}>{resa.clientEmail}</strong>
          </div>
          <div style={{background:"white",borderRadius:16,padding:"16px 20px",width:"100%",maxWidth:360,boxShadow:"0 2px 8px rgba(0,0,0,.06)",marginBottom:28}}>
            <div style={{fontSize:11,color:"#AAA",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8}}>{t.doneRecap}</div>
            <div style={{fontSize:14,lineHeight:2.1,color:"#333"}}>
              <div>👤 {resa.clientName}</div>
              <div>📅 {fmtFull(resa.date)}</div>
              <div>{resa.equipment.map(function(id){ var lb=labels[id]; var eq=EQUIPMENT.find(function(x){return x.id===id;}); return eq?(eq.emoji+" "+lb):""; }).filter(Boolean).join("  ·  ")}</div>
              <div style={{color:"#3DBD72"}}>{t.contractOk}</div>
            </div>
          </div>
          <button onClick={onNew} style={{background:"transparent",border:"1.5px solid #1B5E5E",color:"#1B5E5E",borderRadius:10,padding:"12px 28px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{t.newBtn}</button>
        </div>
      );
    }

    /* ══════════════════ STAFF PAGE ══════════════════ */
    function StaffPage({ resas, onBack }) {
      var period_s = useState("week");
      var sending_s = useState(false);
      var sent_s    = useState(false);

      var period=period_s[0],   setPeriod=period_s[1];
      var sending=sending_s[0], setSending=sending_s[1];
      var sent=sent_s[0],       setSent=sent_s[1];

      var EQL = EQ_LABELS_FR;

      function getRange() {
        var now = new Date();
        if (period === "week") {
          var day = now.getDay()===0 ? 6 : now.getDay()-1;
          var mon = new Date(now); mon.setDate(now.getDate()-day);
          var sun = new Date(mon); sun.setDate(mon.getDate()+6);
          return { from: mon.toISOString().split("T")[0], to: sun.toISOString().split("T")[0] };
        } else {
          var y=now.getFullYear(), m=now.getMonth();
          return {
            from: y+"-"+String(m+1).padStart(2,"0")+"-01",
            to:   new Date(y,m+1,0).toISOString().split("T")[0]
          };
        }
      }

      var range    = getRange();
      var filtered = resas
        .filter(function(r){ return r.status==="confirmed" && r.date>=range.from && r.date<=range.to; })
        .sort(function(a,b){ return a.date.localeCompare(b.date); });

      async function doSend() {
        setSending(true);
        try {
          await sendReportMail(resas, period);
          setSent(true);
          setTimeout(function(){ setSent(false); }, 3000);
        } catch(e) { console.warn(e); }
        setSending(false);
      }

      return (
        <div style={{fontFamily:"'DM Sans',sans-serif",background:"#F7F3EC",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:40}}>

              <div style={{fontSize:11,opacity:.6,marginTop:2}}>Villas Vallee d'Asco</div>
            </div>
          </div>

          <div style={{padding:16}}>
            <div style={{display:"flex",gap:8,marginBottom:20}}>
              {[{k:"week",l:"Cette semaine"},{k:"month",l:"Ce mois"}].map(function(p){
                return (
                  <button key={p.k} onClick={function(){setPeriod(p.k);setSent(false);}} style={{flex:1,padding:"10px",borderRadius:10,border:"2px solid "+(period===p.k?"#1B5E5E":"#E5DDD0"),background:period===p.k?"#1B5E5E":"white",color:period===p.k?"white":"#555",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:13,transition:"all .2s"}}>
                    {p.l}
                  </button>
                );
              })}
            </div>

            <div style={{fontSize:12,color:"#AAA",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:12}}>
              {fmtFull(range.from)} → {fmtFull(range.to)} · {filtered.length} réservation{filtered.length>1?"s":""}
            </div>

            {filtered.length === 0
              ? <div style={{textAlign:"center",color:"#bbb",fontSize:14,marginTop:40}}><div style={{fontSize:32,marginBottom:10}}>📭</div>Aucune réservation sur cette période</div>
              : filtered.map(function(r){
                  return (
                    <div key={r.id} style={{background:"white",borderRadius:12,padding:"13px 16px",marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div style={{fontWeight:600,fontSize:14}}>{r.clientName}</div>
                        <div style={{fontSize:12,fontWeight:600,color:"#1B5E5E"}}>📅 {fmtFull(r.date)}</div>
                      </div>
                      <div style={{fontSize:12,color:"#888",marginTop:2}}>{r.clientEmail}</div>
                      <div style={{marginTop:6}}>
                        {r.equipment.map(function(id){
                          return <span key={id} style={{display:"inline-block",background:"#F0EDE8",borderRadius:6,padding:"2px 8px",fontSize:11,marginRight:4,marginTop:2}}>{EQL[id]||id}</span>;
                        })}
                      </div>
                    </div>
                  );
                })
            }

            <button onClick={doSend} disabled={sending||filtered.length===0}
              style={{width:"100%",marginTop:20,padding:"14px",borderRadius:10,border:"none",fontSize:15,fontWeight:600,cursor:sending||filtered.length===0?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",color:"white",background:sent?"#3DBD72":sending||filtered.length===0?"#D4CFC8":"#1B5E5E",transition:"background .3s"}}>
              {sent ? "✓ Rapport envoyé !" : sending ? "Envoi…" : "📧 Envoyer le rapport par mail"}
            </button>
          </div>
        </div>
      );
    }

    /* ── Shared UI ── */
    function SHead({ n, t, title }) {
      return (
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:"#1B5E5E",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:3}}>{t.step} {n} {t.of} 3</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:600}}>{title}</div>
        </div>
      );
    }
    function Fld({ label, children }) {
      return <div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:600,color:"#777",marginBottom:6}}>{label}</div>{children}</div>;
    }
    function PBtn({ disabled, onClick, children, flex }) {
      return <button onClick={function(){if(!disabled)onClick();}} style={{flex:flex?1:undefined,width:flex?undefined:"100%",marginTop:8,padding:"14px",borderRadius:10,border:"none",fontSize:15,fontWeight:600,cursor:disabled?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",color:"white",background:disabled?"#D4CFC8":"#1B5E5E",transition:"background .2s"}}>{children}</button>;
    }
    function BBtn({ onClick }) {
      return <button onClick={onClick} style={{marginTop:8,padding:"14px 16px",borderRadius:10,border:"1.5px solid #E5DDD0",fontSize:18,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",color:"#888",background:"white"}}>←</button>;
    }
    var INP = {width:"100%",padding:"11px 12px",borderRadius:8,border:"1.5px solid #E5DDD0",background:"white",fontSize:14,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",outline:"none",color:"#2C2C2C"};

    try {
      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    } catch(e) {
      document.getElementById("root").innerHTML = '<div style="padding:20px;font-family:sans-serif;color:red;"><b>Erreur:</b><br>' + e.message + '<br><pre>' + e.stack + '</pre></div>';
    }
  </script>
</body>
</html>
