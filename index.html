VVA.fmtDate = function(s){ if(!s) return ''; var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; };

VVA.today   = function(){ return new Date().toISOString().split('T')[0]; };

VVA.getIP = function(cb){
  fetch('https://api.ipify.org?format=json')
    .then(function(r){return r.json();})
    .then(function(d){cb(d.ip||'unknown');})
    .catch(function(){cb('unknown');});
};

      email_body: body
    }).catch(function(e){console.warn('Client mail:',e);});
  });

VVA.generatePDF = function(resa, lang, cb){
  try{
    var jsPDF = window.jspdf && window.jspdf.jsPDF;
    if(!jsPDF){ cb(null); return; }
    var doc = new jsPDF({unit:'mm',format:'a4'});
    var labels = lang==='en' ? VVA.EQ_EN : VVA.EQ_FR;
    var equipStr = resa.equipment.map(function(id){return labels[id]||id;}).join(', ');
    var hasBike  = resa.equipment.some(function(id){return id.startsWith('B');});
    var hasPaddle= resa.equipment.some(function(id){return id.startsWith('P');});
    var acceptedAt = new Date(resa.acceptedAt).toLocaleString('fr-FR',{timeZone:'Europe/Paris'});
    var dateStr = VVA.fmtDate(resa.date);

    doc.setFillColor(27,94,94); doc.rect(0,0,210,26,'F');
    try{var img=new Image();img.src=VVA.LOGO;doc.addImage(img,'PNG',10,4,22,18);}catch(e){}
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.text("Villas Vallee d'Asco",36,12);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text('vva-corse.com - 06-12-38-58-67',36,19);

    doc.setFillColor(245,241,235);doc.roundedRect(10,30,190,30,3,3,'F');
    doc.setTextColor(27,94,94);doc.setFont('helvetica','bold');doc.setFontSize(8);
    ['CLIENT','DATE','EQUIPEMENTS','ID'].forEach(function(l,i){doc.text(l,14,38+i*6);});
    doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
    [resa.clientName+' <'+resa.clientEmail+'>',dateStr,equipStr,resa.id].forEach(function(v,i){
      doc.text(String(v).substring(0,60),58,38+i*6);
    });

    var y=66;
    function addSection(title,text){
      if(y>250){doc.addPage();y=15;}
      doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(27,94,94);
      doc.text(title,105,y,{align:'center'});y+=5;
      doc.setDrawColor(27,94,94);doc.setLineWidth(0.3);doc.line(10,y,200,y);y+=4;
      doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(50,50,50);
      var lines=doc.splitTextToSize(text.replace(/\\n/g,'\n'),175);
      lines.forEach(function(line){
        if(y>272){doc.addPage();y=15;}
        doc.text(line,12,y);y+=4.5;
      });
      y+=4;
    }
    if(hasBike)   addSection(lang==='en'?'E-BIKE RENTAL AGREEMENT':'CONTRAT LOCATION VTC E-BIKE',VVA.CONTRACTS.bike[lang]);
    if(hasPaddle) addSection(lang==='en'?'PADDLE BOARD AGREEMENT':'CONTRAT PADDLE BOARD',VVA.CONTRACTS.paddle[lang]);

    if(y>240){doc.addPage();y=15;}
    doc.setDrawColor(200,200,200);doc.setLineWidth(0.3);doc.line(10,y,200,y);y+=8;
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(27,94,94);
    doc.text(lang==='en'?'ELECTRONIC ACCEPTANCE':'ACCEPTATION ELECTRONIQUE',105,y,{align:'center'});y+=7;
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(50,50,50);
    doc.text((lang==='en'?'Accepted: ':'Accepte le : ')+acceptedAt,14,y);y+=5;
    doc.text('IP : '+resa.clientIP,14,y);y+=10;
    doc.setDrawColor(100,150,150);doc.setLineWidth(0.5);doc.line(50,y,160,y);y+=6;
    doc.setFont('helvetica','bolditalic');doc.setFontSize(24);doc.setTextColor(27,94,94);
    doc.text(resa.clientName,105,y,{align:'center'});y+=5;
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(150,150,150);
    doc.text("Signature numerique - Villas Vallee d'Asco",105,y,{align:'center'});

    var pageCount=doc.internal.getNumberOfPages();
    for(var i=1;i<=pageCount;i++){
      doc.setPage(i);doc.setFillColor(27,94,94);doc.rect(0,287,210,10,'F');
      doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.text("Villas Vallee d'Asco - vva-corse.com - "+resa.id,105,293,{align:'center'});
    }

    var pdfB64=doc.output('datauristring');
    db.ref('contracts/'+resa.id).set({pdf:pdfB64,clientName:resa.clientName,createdAt:resa.acceptedAt})
      .then(function(){cb(VVA.SITE_URL+'/contrat.html?id='+resa.id);})
      .catch(function(){cb(null);});
  }catch(e){console.warn('PDF error:',e);cb(null);}
};

VVA.saveResa = function(data, lang, onDone){
  VVA.getIP(function(ip){
    var now = new Date().toISOString();
    var r = Object.assign({}, data, {
      id:genId(), lang:lang, status:'confirmed',
      createdAt:now, acceptedAt:now, clientIP:ip
    });
    db.ref('reservations/'+r.id).set(r).then(function(){
      VVA.sendMails(r, lang);
      onDone(r);
    }).catch(function(e){console.error(e); onDone(null);});
  });
};

function genId(){ return VVA.genId(); }

VVA.sendReport = function(resas, period, onDone){
  var now=new Date(); var from,to,label;
  if(period==='week'){
    label='semaine';
    var day=now.getDay()===0?6:now.getDay()-1;
    var mon=new Date(now);mon.setDate(now.getDate()-day);
    var sun=new Date(mon);sun.setDate(mon.getDate()+6);
    from=mon.toISOString().split('T')[0];to=sun.toISOString().split('T')[0];
  }else{
    label='mois';var y=now.getFullYear(),m=now.getMonth();
    from=y+'-'+String(m+1).padStart(2,'0')+'-01';
    to=new Date(y,m+1,0).toISOString().split('T')[0];
  }
  var filtered=resas.filter(function(r){return r.status==='confirmed'&&r.date>=from&&r.date<=to;})
    .sort(function(a,b){return a.date.localeCompare(b.date);});
  var lines=filtered.length===0?'Aucune reservation.'
    :filtered.map(function(r){return '- '+VVA.fmtDate(r.date)+' : '+r.clientName+' ('+r.clientEmail+') '+r.equipment.map(function(id){return VVA.EQ_FR[id]||id;}).join(', ');}).join('\n');
  var body='RAPPORT '+label.toUpperCase()+' VVA\n'+VVA.fmtDate(from)+' - '+VVA.fmtDate(to)+'\n\n'+lines+'\n\nTotal: '+filtered.length;
  emailjs.send('service_nfp7n4q','template_vahjpcg',{
    to_email:'VOTRE_EMAIL@gmail.com',
    email_subject:'Rapport '+label+' VVA',
    email_body:body
  }).then(function(){onDone(true);}).catch(function(){onDone(false);});
};

var isEmail = function(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); };

function App(){
  var s1=useState([]),s2=useState(false),s3=useState("fr"),s4=useState(false);
  var resas=s1[0],setResas=s1[1];
  var ready=s2[0],setReady=s2[1];
  var lang=s3[0],setLang=s3[1];
  var staff=s4[0],setStaff=s4[1];

  useEffect(function(){
    var ref=db.ref("reservations");
    ref.on("value",function(snap){
      var val=snap.val();setResas(val?Object.values(val):[]);setReady(true);
    });
    return function(){ref.off("value");};
  },[]);

  function blockedOn(date){
    if(!date) return [];
    return resas.filter(function(r){return r.status==="confirmed"&&r.date===date;})
      .reduce(function(acc,r){return acc.concat(r.equipment||[]);},[]);
  }

  if(!ready) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'DM Sans',sans-serif",background:"#F7F3EC",color:"#1B5E5E",fontSize:14}}>
      {lang==="fr"?"Chargement…":"Loading…"}
    </div>
  );
  if(staff) return <StaffPage resas={resas} onBack={function(){setStaff(false);}}/>;

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#F7F3EC",minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      <BookingFlow lang={lang} setLang={setLang} blockedOn={blockedOn} onStaff={function(){setStaff(true);}}/>
    </div>
  );
}

function BookingFlow({lang,setLang,blockedOn,onStaff}){
  var s1=useState(0),s2=useState(EMPTY),s3=useState(null),s4=useState(false);
  var s5=useState(""),s6=useState(false),s7=useState(false);
  var step=s1[0],setStep=s1[1];
  var form=s2[0],setForm=s2[1];
  var done=s3[0],setDone=s3[1];
  var sending=s4[0],setSending=s4[1];
  var pin=s5[0],setPin=s5[1];
  var pinOpen=s6[0],setPinOpen=s6[1];
  var pinErr=s7[0],setPinErr=s7[1];
  var t=T[lang];

  function set(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});}
  var blocked=blockedOn(form.date);

  function setDate(d){
    var nb=blockedOn(d);
    setForm(function(f){return Object.assign({},f,{date:d,equipment:f.equipment.filter(function(id){return !nb.includes(id);})});});
  }

  function submit(){
    setSending(true);
    VVA.saveResa(form, lang, function(r){
      setSending(false);
      if(r) setDone(r);
    });
  }

  function tryPin(){
    if(pin===VVA.STAFF_PIN){onStaff();}
    else{setPinErr(true);setTimeout(function(){setPinErr(false);},1200);}
  }

  if(done) return <DoneScreen resa={done} lang={lang} t={t} onNew={function(){setDone(null);setStep(0);setForm(EMPTY);}}/>;
  if(step===0) return <WelcomeScreen lang={lang} setLang={setLang} t={t} onStart={function(){setStep(1);}}/>;

  return (
    <div style={{paddingBottom:56}}>
      <div style={{background:"#1B5E5E",padding:"16px",color:"white"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:40,height:32,flexShrink:0}}>
              <img src={VVA.LOGO} alt="VVA" style={{width:"100%",height:"100%",objectFit:"contain",filter:"brightness(0) invert(1)"}}/>
            </div>
            <div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600,lineHeight:1.2}}>Villas Vallée d'Asco</div>
              <div style={{fontSize:10,opacity:.6}}>Corse · Valle d'Asco</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{display:"flex",background:"rgba(255,255,255,.12)",borderRadius:20,padding:3,gap:2}}>
              {["fr","en"].map(function(l){return <button key={l} onClick={function(){setLang(l);}} style={{padding:"4px 10px",borderRadius:16,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:lang===l?"white":"transparent",color:lang===l?"#1B5E5E":"rgba(255,255,255,.7)"}}>{l.toUpperCase()}</button>;})}
            </div>
            {!pinOpen
              ?<button onClick={function(){setPinOpen(true);}} style={{background:"rgba(255,255,255,.1)",border:"none",color:"rgba(255,255,255,.5)",fontSize:10,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",borderRadius:10,padding:"4px 8px"}}>Staff</button>
              :<div style={{display:"flex",gap:4,alignItems:"center"}}>
                <input type="password" placeholder="PIN" value={pin} onChange={function(e){setPin(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")tryPin();}}
                  style={{width:62,padding:"4px 6px",borderRadius:8,border:"1.5px solid "+(pinErr?"#E05555":"rgba(255,255,255,.4)"),fontSize:13,textAlign:"center",outline:"none",background:"rgba(255,255,255,.15)",color:"white"}}/>
                <button onClick={tryPin} style={{background:"rgba(255,255,255,.25)",color:"white",border:"none",borderRadius:8,padding:"4px 8px",fontSize:12,cursor:"pointer"}}>→</button>
              </div>}
          </div>
        </div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,marginBottom:2}}>{lang==="fr"?"Réserver un équipement":"Book equipment"}</div>
        <div style={{fontSize:11,opacity:.6}}>{t.tagline}</div>
      </div>
      <div style={{display:"flex",padding:"12px 20px 4px",gap:5}}>
        {[1,2,3].map(function(s){return <div key={s} style={{flex:1,height:3,borderRadius:2,background:s<=step?"#1B5E5E":"#E5DDD0",transition:"background .3s"}}/>;})}</div>
      <div style={{padding:"10px 16px 0"}}>
        {step===1&&<S1 form={form} set={set} setDate={setDate} blocked={blocked} lang={lang} t={t} onNext={function(){setStep(2);}} onBack={function(){setStep(0);}}/>}
        {step===2&&<S2 form={form} set={set} t={t} onNext={function(){setStep(3);}} onBack={function(){setStep(1);}}/>}
        {step===3&&<S3 form={form} set={set} lang={lang} t={t} onSubmit={submit} onBack={function(){setStep(2);}} sending={sending}/>}
      </div>
    </div>
  );
}

  var isEN=lang==="en";
  return (
    <div style={{paddingBottom:40}}>
      <div style={{background:"linear-gradient(160deg,#1B5E5E 0%,#0f3535 100%)",padding:"32px 20px 28px",color:"white",textAlign:"center",position:"relative"}}>
        <div style={{position:"absolute",top:14,right:14,display:"flex",background:"rgba(255,255,255,.12)",borderRadius:20,padding:3,gap:2}}>
          {["fr","en"].map(function(l){return <button key={l} onClick={function(){setLang(l);}} style={{padding:"4px 10px",borderRadius:16,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:lang===l?"white":"transparent",color:lang===l?"#1B5E5E":"rgba(255,255,255,.7)"}}>{l.toUpperCase()}</button>;})}
        </div>
        <div style={{width:80,height:64,margin:"0 auto 14px"}}>
          <img src={VVA.LOGO} alt="VVA" style={{width:"100%",height:"100%",objectFit:"contain",filter:"brightness(0) invert(1)"}}/>
        </div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,letterSpacing:".15em",opacity:.6,textTransform:"uppercase",marginBottom:5}}>Villas Vallée d'Asco</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:600,lineHeight:1.2,marginBottom:7}}>{isEN?"Discover the valley differently":"Découvrez la vallée autrement"}</div>
        <div style={{fontSize:12,opacity:.7}}>{isEN?"Electric bikes & paddles at your disposal":"Vélos électriques & paddles à votre disposition"}</div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          {[{icon:"⚡",val:"80 km",lbl:isEN?"range":"autonomie"},{icon:"🌿",val:isEN?"Free":"Gratuit",lbl:isEN?"included":"inclus"},{icon:"🏅",val:"Eco",lbl:"Ecolabel UE"}].map(function(c){
            return <div key={c.icon} style={{flex:1,background:"white",borderRadius:12,padding:"12px 6px",textAlign:"center",boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
              <div style={{fontSize:20,marginBottom:3}}>{c.icon}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:"#1B5E5E",lineHeight:1}}>{c.val}</div>
              <div style={{fontSize:10,color:"#AAA",marginTop:2,textTransform:"uppercase",letterSpacing:".04em"}}>{c.lbl}</div>
            </div>;
          })}
        </div>
        <div style={{background:"white",borderRadius:12,padding:"14px",marginBottom:12,boxShadow:"0 1px 5px rgba(0,0,0,.06)"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#1B5E5E",marginBottom:7,textTransform:"uppercase",letterSpacing:".06em"}}>{isEN?"About the bikes":"Les vélos"}</div>
          <div style={{fontSize:13,color:"#555",lineHeight:1.65}}>{isEN?"Specialized COMO 4.0 e-bikes — up to 80 km range, helmet and lock included.":"Specialized COMO 4.0 — jusqu'à 80 km d'autonomie, casque et antivol inclus."}</div>
        </div>
        <div style={{background:"#F0F7F4",borderRadius:12,padding:"12px 14px",marginBottom:12,borderLeft:"3px solid #3DBD72"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#2E7D52",marginBottom:4}}>🌱 {isEN?"Eco-responsible commitment":"Engagement éco-responsable"}</div>
          <div style={{fontSize:12,color:"#555",lineHeight:1.6}}>{isEN?"European Ecolabel certified property. Choose the e-bike to reduce your carbon footprint.":"Établissement labellisé Écolabel Européen. Choisir le vélo électrique, c'est réduire votre empreinte carbone."}</div>
        </div>
        <div style={{background:"white",borderRadius:12,padding:"14px",marginBottom:16,boxShadow:"0 1px 5px rgba(0,0,0,.06)"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#1B5E5E",marginBottom:8,textTransform:"uppercase",letterSpacing:".06em"}}>{isEN?"A few rules":"Quelques règles"}</div>
          {(isEN?["Respect the Highway Code","Always lock the bike","Use only the provided charger","Report any incident","Return clean with all accessories","Helmet strongly recommended"]:["Respecter le Code de la route","Attacher le vélo avec l'antivol","Utiliser uniquement le chargeur fourni","Signaler tout incident","Restituer propre avec tous ses accessoires","Casque fortement recommandé"]).map(function(rule,i){
            return <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:5}}>
              <div style={{width:16,height:16,borderRadius:"50%",background:"#E8F4F4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#1B5E5E",fontWeight:700,flexShrink:0,marginTop:1}}>✓</div>
              <div style={{fontSize:12,color:"#555",lineHeight:1.5}}>{rule}</div>
            </div>;
          })}
        </div>
        <div style={{background:"#FFF8F0",borderRadius:10,padding:"10px 14px",marginBottom:20,fontSize:12,color:"#C4622D",lineHeight:1.6}}>ℹ️ {isEN?"Available sizes: S, M, L. Our team is here to advise you.":"Tailles disponibles : S, M, L. Nous sommes là pour vous conseiller."}</div>
        <button onClick={onStart} style={{width:"100%",padding:"15px",borderRadius:12,border:"none",background:"#1B5E5E",color:"white",fontFamily:"'DM Sans',sans-serif",fontSize:15,fontWeight:600,cursor:"pointer"}}>{isEN?"Book now →":"Réserver →"}</button>
        <div style={{textAlign:"center",fontSize:11,color:"#AAA",marginTop:10,lineHeight:1.6}}>{isEN?"A rental contract must be signed before use.":"Un contrat de location doit être signé avant utilisation."}</div>
      </div>

  );
}

function S1({form,set,setDate,blocked,lang,t,onNext,onBack}){
  var labels=lang==="en"?VVA.EQ_EN:VVA.EQ_FR;
  var canNext=form.date&&form.equipment.length>0;
  function toggle(id){set("equipment",form.equipment.includes(id)?form.equipment.filter(function(e){return e!==id;}):form.equipment.concat([id]));}
  var groups=[{title:t.bikes,items:EQUIP.filter(function(e){return e.type==="bike";})},{title:t.paddles,items:EQUIP.filter(function(e){return e.type==="paddle";})}];
  return (
    <div>
      <SHead n={1} t={t} title={t.s1}/>
      <Fld label={t.dateLabel}>
        <input type="date" value={form.date} min={todayISO()} onChange={function(e){setDate(e.target.value);}} style={{...INP,fontSize:16}}/>
      </Fld>
      {!form.date&&<div style={{textAlign:"center",color:"#C0B8AE",fontSize:13,marginTop:4,marginBottom:10}}>{t.dateHint}</div>}
      {form.date&&groups.map(function(g){
        return <div key={g.title} style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:600,color:"#666",marginBottom:7}}>{g.title}</div>
          {g.items.map(function(eq){
            var on=form.equipment.includes(eq.id),off=blocked.includes(eq.id);
            return <button key={eq.id} onClick={function(){if(!off)toggle(eq.id);}} style={{display:"flex",alignItems:"center",gap:12,width:"100%",marginBottom:6,padding:"11px 13px",borderRadius:12,border:"2px solid "+(on?"#1B5E5E":off?"#EEE":"#E5DDD0"),background:on?"#1B5E5E":off?"#F5F5F5":"white",cursor:off?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",textAlign:"left"}}>
              <span style={{fontSize:20}}>{eq.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:on?"white":off?"#CCC":"#2C2C2C"}}>{labels[eq.id]}</div>
                <div style={{fontSize:11,marginTop:1,color:on?"rgba(255,255,255,.65)":off?"#CCC":"#3DBD72"}}>{off?t.taken:t.avail}</div>
              </div>
              <div style={{width:18,height:18,borderRadius:"50%",border:"2px solid "+(on?"white":off?"#EEE":"#D0C8BF"),background:on?"white":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {on&&<div style={{width:9,height:9,borderRadius:"50%",background:"#1B5E5E"}}/>}
              </div>
            </button>;
          })}
        </div>;
      })}
      <div style={{display:"flex",gap:8}}><BBtn onClick={onBack}/><PBtn disabled={!canNext} onClick={onNext} flex>{t.next1}</PBtn></div>
    </div>
  );
}

function S2({form,set,t,onNext,onBack}){
  var ts=useState(false);var touched=ts[0],setTouched=ts[1];
  var emailOk=isEmail(form.clientEmail);
  var valid=form.clientName.trim()&&emailOk;
  var bC=form.equipment.filter(function(id){return id.startsWith("B");}).length;
  var pC=form.equipment.filter(function(id){return id.startsWith("P");}).length;
  var eqSum=[bC>0&&bC+" "+(bC>1?t.bikePlur:t.bikeSing),pC>0&&pC+" "+(pC>1?t.paddlePlur:t.paddleSing)].filter(Boolean).join(", ");
  return (
    <div>
      <SHead n={2} t={t} title={t.s2}/>
      <div style={{background:"white",borderRadius:12,padding:"11px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
        <div style={{fontSize:20}}>{form.equipment.map(function(id){var e=EQUIP.find(function(x){return x.id===id;});return e?e.emoji:"";}).join(" ")}</div>
        <div style={{fontSize:13,color:"#555"}}>{eqSum} · <span style={{color:"#1B5E5E",fontWeight:600}}>{fmtFull(form.date)}</span></div>
      </div>
      <Fld label={t.nameLabel}><input value={form.clientName} onChange={function(e){set("clientName",e.target.value);}} placeholder={t.namePh} style={INP}/></Fld>
      <Fld label={t.emailLabel}>
        <input type="email" value={form.clientEmail} onChange={function(e){set("clientEmail",e.target.value);}} onBlur={function(){setTouched(true);}} placeholder={t.emailPh} style={{...INP,borderColor:touched&&!emailOk&&form.clientEmail?"#E05555":"#E5DDD0"}}/>
        {touched&&!emailOk&&form.clientEmail&&<div style={{fontSize:11,color:"#E05555",marginTop:3}}>{t.emailErr}</div>}
      </Fld>
      <div style={{display:"flex",gap:8,marginTop:4}}><BBtn onClick={onBack}/><PBtn disabled={!valid} onClick={onNext} flex>{t.next2}</PBtn></div>
    </div>
  );
}

function S3({form,set,lang,t,onSubmit,onBack,sending}){
  var sc1=useState(false),sc2=useState(false);
  var scrolled1=sc1[0],setScrolled1=sc1[1];
  var scrolled2=sc2[0],setScrolled2=sc2[1];
  var hasBike  =form.equipment.some(function(id){return id.startsWith("B");});
  var hasPaddle=form.equipment.some(function(id){return id.startsWith("P");});
  var bC=form.equipment.filter(function(id){return id.startsWith("B");}).length;
  var pC=form.equipment.filter(function(id){return id.startsWith("P");}).length;
  var valid=(!hasBike||form.bikeAccepted)&&(!hasPaddle||form.paddleAccepted);
  return (
    <div>
      <SHead n={3} t={t} title={t.s3}/>
      <div style={{background:"white",borderRadius:12,padding:"11px 14px",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
        <div style={{fontSize:11,fontWeight:700,color:"#AAA",textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}}>{t.recap}</div>
        <div style={{fontSize:13,lineHeight:1.9,color:"#444"}}>
          <div>👤 {form.clientName}</div>
          <div>📅 {fmtFull(form.date)}</div>
          {bC>0&&<div>⚡ {bC} {bC>1?t.bikePlur:t.bikeSing}</div>}
          {pC>0&&<div>🚣 {pC} {pC>1?t.paddlePlur:t.paddleSing}</div>}
        </div>
      </div>
      {hasBike&&(
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#1B5E5E",marginBottom:5}}>⚡ {lang==="en"?"E-Bike Rental Agreement":"Contrat location vélos électriques"}</div>
          <ContractBox text={VVA.CONTRACTS.bike[lang]} scrolled={scrolled1} onScroll={function(){setScrolled1(true);}} t={t} color="#E5DDD0"/>
          <CBox accepted={form.bikeAccepted} canCheck={scrolled1} onChange={function(){if(scrolled1)set("bikeAccepted",!form.bikeAccepted);}} text={t.checkBike} color="#1B5E5E" bg="#E8F4F4"/>
        </div>
      )}
      {hasPaddle&&(
        <div style={{marginBottom:18}}>
          <div style={{fontSize:12,fontWeight:700,color:"#C4622D",marginBottom:5}}>🚣 {lang==="en"?"Paddle Board Agreement":"Contrat paddle board"}</div>
          <ContractBox text={VVA.CONTRACTS.paddle[lang]} scrolled={scrolled2} onScroll={function(){setScrolled2(true);}} t={t} color="#F5DDCC"/>
          <CBox accepted={form.paddleAccepted} canCheck={scrolled2} onChange={function(){if(scrolled2)set("paddleAccepted",!form.paddleAccepted);}} text={t.checkPaddle} color="#C4622D" bg="#FFF0EB"/>
        </div>
      )}
      <div style={{display:"flex",gap:8}}>
        <BBtn onClick={onBack}/>
        <button onClick={function(){if(valid&&!sending)onSubmit();}} style={{flex:1,padding:"13px",borderRadius:10,border:"none",fontSize:14,fontWeight:600,cursor:valid&&!sending?"pointer":"not-allowed",fontFamily:"'DM Sans',sans-serif",color:"white",background:valid&&!sending?"#1B5E5E":"#D4CFC8",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {sending?<span><span style={{display:"inline-block",width:14,height:14,border:"2px solid rgba(255,255,255,.4)",borderTopColor:"white",borderRadius:"50%",animation:"spin .7s linear infinite",verticalAlign:"middle"}}></span>{" "+t.sending}</span>:t.sendBtn}
        </button>
      </div>
    </div>
  );
}

function ContractBox({text,scrolled,onScroll,t,color}){
  return (
    <div style={{position:"relative",marginBottom:5}}>
      <div onScroll={function(e){var el=e.target;if(el.scrollTop+el.clientHeight>=el.scrollHeight-20)onScroll();}}
        style={{background:"white",borderRadius:12,padding:"12px 14px",fontSize:11,color:"#555",lineHeight:1.7,maxHeight:155,overflowY:"auto",border:"1.5px solid "+color,whiteSpace:"pre-wrap",fontFamily:"Georgia,serif"}}>
        {text}
      </div>
      {!scrolled&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:36,background:"linear-gradient(transparent,rgba(255,255,255,.95))",borderRadius:"0 0 12px 12px",display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:4,pointerEvents:"none"}}><span style={{fontSize:10,color:"#AAA"}}>{t.scroll}</span></div>}
    </div>
  );
}

function CBox({accepted,canCheck,onChange,text,color,bg}){
  return (
    <div onClick={onChange} style={{background:accepted?bg:"white",border:"2px solid "+(accepted?color:"#E5DDD0"),borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"flex-start",gap:9,cursor:canCheck?"pointer":"not-allowed",opacity:canCheck?1:.45,transition:"all .2s"}}>
      <div style={{width:17,height:17,borderRadius:4,border:"2px solid "+(accepted?color:"#CCC"),background:accepted?color:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
        {accepted&&<span style={{color:"white",fontSize:10,fontWeight:700}}>✓</span>}
      </div>
      <div style={{fontSize:11,color:"#333",lineHeight:1.5}}>{text}</div>
    </div>
  );
}

  var labels=lang==="en"?VVA.EQ_EN:VVA.EQ_FR;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:24,background:"#F7F3EC"}}>
      <div style={{width:66,height:66,background:"#1B5E5E",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,marginBottom:20}}>✅</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:25,fontWeight:600,marginBottom:8,textAlign:"center"}}>{t.doneTitle}</div>
      <div style={{fontSize:14,color:"#888",textAlign:"center",marginBottom:22,lineHeight:1.7}}>{t.doneSub}<br/><strong style={{color:"#1B5E5E"}}>{resa.clientEmail}</strong></div>
      <div style={{background:"white",borderRadius:14,padding:"14px 18px",width:"100%",maxWidth:360,boxShadow:"0 2px 8px rgba(0,0,0,.06)",marginBottom:22}}>
        <div style={{fontSize:11,color:"#AAA",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>{t.doneRecap}</div>
        <div style={{fontSize:13,lineHeight:2,color:"#333"}}>
          <div>👤 {resa.clientName}</div>
          <div>📅 {fmtFull(resa.date)}</div>
          <div>{(resa.equipment||[]).map(function(id){var e=EQUIP.find(function(x){return x.id===id;});return e?(e.emoji+" "+labels[id]):"";}).filter(Boolean).join("  ·  ")}</div>
          <div style={{color:"#3DBD72"}}>{t.contractOk}</div>
        </div>
      </div>
      <button onClick={onNew} style={{background:"transparent",border:"1.5px solid #1B5E5E",color:"#1B5E5E",borderRadius:10,padding:"11px 24px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{t.newBtn}</button>
    </div>
  );
}

function StaffPage({resas,onBack}){
  var s1=useState("home"),s2=useState("week"),s3=useState(false),s4=useState(false);
  var tab=s1[0],setTab=s1[1];
  var period=s2[0],setPeriod=s2[1];
  var sending=s3[0],setSending=s3[1];
  var sent=s4[0],setSent=s4[1];
  var today=VVA.today();
  var confirmed=resas.filter(function(r){return r.status==="confirmed";});

  function getRange(){
    var now=new Date(),from,to;
    if(period==="week"){
      var day=now.getDay()===0?6:now.getDay()-1;
      var mon=new Date(now);mon.setDate(now.getDate()-day);
      var sun=new Date(mon);sun.setDate(mon.getDate()+6);
      from=mon.toISOString().split("T")[0];to=sun.toISOString().split("T")[0];
    }else{
      var y=now.getFullYear(),m=now.getMonth();
      from=y+"-"+String(m+1).padStart(2,"0")+"-01";
      to=new Date(y,m+1,0).toISOString().split("T")[0];
    }
    return {from:from,to:to};
  }

  var range=getRange();
  var filtered=confirmed.filter(function(r){return r.date>=range.from&&r.date<=range.to;})
    .sort(function(a,b){return a.date.localeCompare(b.date);});

  function doReport(){
    setSending(true);
    VVA.sendReport(resas,period,function(ok){
      setSending(false);setSent(ok);setTimeout(function(){setSent(false);},3000);
    });
  }

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#F7F3EC",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:70}}>
      <div style={{background:"#1B5E5E",padding:"16px",color:"white",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,.15)",border:"none",color:"white",borderRadius:8,padding:"5px 11px",fontSize:16,cursor:"pointer"}}>←</button>
        <div style={{width:32,height:26,flexShrink:0}}>
          <img src={VVA.LOGO} alt="VVA" style={{width:"100%",height:"100%",objectFit:"contain",filter:"brightness(0) invert(1)"}}/>
        </div>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600}}>Gestion Staff</div>
          <div style={{fontSize:10,opacity:.6}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</div>
        </div>
      </div>
      <div style={{padding:14}}>
        {tab==="home"&&(
          <div>
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              {[{emoji:"⚡",label:"Vélos",avail:EQUIP.filter(function(e){return e.type==="bike"&&!confirmed.some(function(r){return (r.equipment||[]).includes(e.id)&&r.date===today;});}).length,total:4,color:"#1B5E5E"},
                {emoji:"🚣",label:"Paddles",avail:EQUIP.filter(function(e){return e.type==="paddle"&&!confirmed.some(function(r){return (r.equipment||[]).includes(e.id)&&r.date===today;});}).length,total:2,color:"#C4622D"}].map(function(c){
                return <div key={c.label} style={{flex:1,background:c.color,borderRadius:13,padding:"13px 10px",color:"white"}}>
                  <div style={{fontSize:20,marginBottom:3}}>{c.emoji}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:600,lineHeight:1}}>{c.avail}<span style={{fontSize:13,opacity:.5}}>/{c.total}</span></div>
                  <div style={{fontSize:10,opacity:.75,marginTop:2}}>{c.label} dispo</div>
                </div>;
              })}
            </div>
            <div style={{fontSize:11,fontWeight:700,color:"#AAA",textTransform:"uppercase",letterSpacing:".07em",marginBottom:7}}>État du parc aujourd'hui</div>
            {EQUIP.map(function(eq){
              var o=confirmed.find(function(r){return (r.equipment||[]).includes(eq.id)&&r.date===today;});
              return <div key={eq.id} style={{background:"white",borderRadius:10,padding:"10px 13px",display:"flex",alignItems:"center",gap:10,marginBottom:6,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                <span style={{fontSize:17}}>{eq.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{VVA.EQ_FR[eq.id]}</div>
                  <div style={{fontSize:11,color:"#999",marginTop:1}}>{o?(o.clientName):"Disponible"}</div>
                </div>
                <div style={{width:8,height:8,borderRadius:"50%",background:o?"#E07040":"#3DBD72"}}/>
              </div>;
            })}
          </div>
        )}
        {tab==="report"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {[{k:"week",l:"Cette semaine"},{k:"month",l:"Ce mois"}].map(function(p){
                return <button key={p.k} onClick={function(){setPeriod(p.k);setSent(false);}} style={{flex:1,padding:"9px",borderRadius:9,border:"2px solid "+(period===p.k?"#1B5E5E":"#E5DDD0"),background:period===p.k?"#1B5E5E":"white",color:period===p.k?"white":"#555",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12}}>{p.l}</button>;
              })}
            </div>
            <div style={{fontSize:11,color:"#AAA",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>{VVA.fmtDate(range.from)} → {VVA.fmtDate(range.to)} · {filtered.length} rés.</div>
            {filtered.length===0?<div style={{textAlign:"center",color:"#bbb",fontSize:13,marginTop:30}}>📭 Aucune réservation</div>:filtered.map(function(r){
              return <div key={r.id} style={{background:"white",borderRadius:10,padding:"10px 13px",marginBottom:6,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div style={{fontWeight:600,fontSize:13}}>{r.clientName}</div>
                  <div style={{fontSize:11,fontWeight:600,color:"#1B5E5E"}}>📅 {VVA.fmtDate(r.date)}</div>
                </div>
                <div style={{fontSize:11,color:"#888",marginTop:2}}>{r.clientEmail}</div>
                <div style={{marginTop:4}}>{(r.equipment||[]).map(function(id){return <span key={id} style={{display:"inline-block",background:"#F0EDE8",borderRadius:5,padding:"1px 6px",fontSize:10,marginRight:3}}>{VVA.EQ_FR[id]||id}</span>;})}</div>
              </div>;
            })}
            <button onClick={doReport} disabled={sending||filtered.length===0} style={{width:"100%",marginTop:12,padding:"12px",borderRadius:9,border:"none",fontSize:13,fontWeight:600,cursor:sending||filtered.length===0?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",color:"white",background:sent?"#3DBD72":sending||filtered.length===0?"#D4CFC8":"#1B5E5E",transition:"background .3s"}}>
              {sent?"✓ Rapport envoyé !":sending?"Envoi…":"📧 Envoyer le rapport par mail"}
            </button>
          </div>
        )}
        {tab==="all"&&(
          <div>
            {resas.length===0?<div style={{textAlign:"center",color:"#bbb",fontSize:13,marginTop:40}}>Aucune réservation</div>:
            [...resas].sort(function(a,b){return (b.createdAt||"").localeCompare(a.createdAt||"");}).map(function(r){
              var bg={confirmed:"#E8F6EE",pending:"#FFF4E0",rejected:"#FDECEA"}[r.status]||"#FFF4E0";
              var fg={confirmed:"#2E7D52",pending:"#B07A00",rejected:"#C0392B"}[r.status]||"#B07A00";
              var lb={confirmed:"Confirmé",pending:"En attente",rejected:"Refusé"}[r.status]||"?";
              return <div key={r.id} style={{background:"white",borderRadius:10,padding:"10px 13px",marginBottom:6,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{r.clientName}</div>
                    <div style={{fontSize:11,color:"#999",marginTop:1}}>{VVA.fmtDate(r.date)} · {r.clientEmail}</div>
                    <div style={{fontSize:16,marginTop:2}}>{(r.equipment||[]).map(function(id){var e=EQUIP.find(function(x){return x.id===id;});return e?e.emoji:"";}).join(" ")}</div>
                  </div>
                  <div style={{fontSize:10,background:bg,color:fg,padding:"2px 7px",borderRadius:20,fontWeight:600,flexShrink:0}}>{lb}</div>
                </div>
              </div>;
            })}
          </div>
        )}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"white",borderTop:"1px solid #E5DDD0",display:"flex",zIndex:100}}>
        {[{id:"home",label:"Accueil",icon:"🏠"},{id:"report",label:"Rapport",icon:"📊"},{id:"all",label:"Toutes",icon:"📋"}].map(function(t2){
          return <button key={t2.id} onClick={function(){setTab(t2.id);}} style={{flex:1,padding:"9px 0 7px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t2.id?"#1B5E5E":"#AAA",fontFamily:"'DM Sans',sans-serif",fontSize:10,fontWeight:tab===t2.id?600:400}}>
            <span style={{fontSize:17}}>{t2.icon}</span>{t2.label}
          </button>;
        })}
      </div>
    </div>
  );
}

function SHead({n,t,title}){return <div style={{marginBottom:14}}><div style={{fontSize:10,color:"#1B5E5E",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",marginBottom:2}}>{t.step} {n} {t.of} 3</div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600}}>{title}</div></div>;}
function Fld({label,children}){return <div style={{marginBottom:13}}><div style={{fontSize:11,fontWeight:600,color:"#777",marginBottom:5}}>{label}</div>{children}</div>;}
function PBtn({disabled,onClick,children,flex}){return <button onClick={function(){if(!disabled)onClick();}} style={{flex:flex?1:undefined,width:flex?undefined:"100%",marginTop:6,padding:"12px",borderRadius:10,border:"none",fontSize:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",fontFamily:"'DM Sans',sans-serif",color:"white",background:disabled?"#D4CFC8":"#1B5E5E"}}>{children}</button>;}
function BBtn({onClick}){return <button onClick={onClick} style={{marginTop:6,padding:"12px 14px",borderRadius:10,border:"1.5px solid #E5DDD0",fontSize:16,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",color:"#888",background:"white"}}>←</button>;}
var INP={width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #E5DDD0",background:"white",fontSize:14,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",outline:"none",color:"#2C2C2C"};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
